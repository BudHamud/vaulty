<!DOCTYPE html>
<html>
<head>
    <style>
        body { width: 300px; font-family: 'Segoe UI', sans-serif; padding: 16px; text-align: center; background: #1a1a2e; color: white; margin: 0; }
        h2 { color: #00a8e1; margin-top: 0; }
        p { font-size: 12px; color: #aaa; line-height: 1.5; }
        button {
            background: #00a8e1; color: white; border: none;
            padding: 11px 20px; font-size: 15px; font-weight: bold;
            border-radius: 8px; cursor: pointer; width: 100%;
            margin-top: 10px; transition: background 0.2s;
        }
        button:hover { background: #0090c5; }
        .info { font-size: 11px; color: #555; margin-top: 10px; }
        a { color: #00a8e1; }
    </style>
</head>
<body>
    <h2>Vaulty Exporter</h2>
    <p>Go to your <a href="https://www.amazon.com/gp/video/history" target="_blank">Prime Video Watch History</a> page and click Start Scan.</p>
    <button id="scanBtn">▶ START SCAN</button>
    <div class="info">Will auto-scroll and capture all watched titles.</div>
    <script src="popup.js"></script>
</body>
</html>
